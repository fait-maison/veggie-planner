replicaCount: 1

image:
  repository: ghcr.io/fait-maison/veggie-planner
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart's appVersion.
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: veggie-planner.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: veggie-planner-tls
  #    hosts:
  #      - veggie-planner.local

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

backend:
  enabled: true
  image:
    repository: ghcr.io/fait-maison/veggie-planner-api
    pullPolicy: IfNotPresent
    tag: ""
  service:
    port: 8000
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
