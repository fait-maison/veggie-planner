{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "veggie-planner.fullname" . }}
  labels:
    {{- include "veggie-planner.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "veggie-planner.fullname" $ }}
                port:
                  name: http
          {{- end }}
          {{- if $.Values.backend.enabled }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "veggie-planner.fullname" $ }}-api
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
