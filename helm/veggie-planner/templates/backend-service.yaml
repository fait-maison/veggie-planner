{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "veggie-planner.fullname" . }}-api
  labels:
    {{- include "veggie-planner.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "veggie-planner.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
